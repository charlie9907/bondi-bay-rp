<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | Bondi Bay Roleplay</title>
    <style>
        :root { --bg: #ffffff; --text: #111111; --accent: #0070f3; --card-bg: #f5f5f7; }
        .dark-theme { --bg: #0a0a0a; --text: #ffffff; --accent: #3291ff; --card-bg: #1a1a1a; }
        
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; transition: 0.3s; overflow-x: hidden; line-height: 1.6; }
        
        /* Navigation (Matches Index) */
        nav { display: flex; justify-content: space-between; padding: 20px 10%; align-items: center; border-bottom: 1px solid #33333322; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        .logo { font-weight: 900; letter-spacing: 1px; font-size: 1.2rem; text-decoration: none; color: var(--text); }
        .nav-links { display: flex; gap: 25px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--text); font-weight: 500; opacity: 0.7; transition: 0.2s; font-size: 0.9rem; }
        .nav-links a:hover { opacity: 1; color: var(--accent); }
        #theme-toggle { cursor: pointer; background: var(--text); color: var(--bg); border: none; padding: 8px 15px; border-radius: 30px; font-size: 0.8rem; font-weight: bold; }

        /* About Hero */
        .about-hero { padding: 120px 10% 60px 10%; }
        .about-hero h1 { font-size: clamp(2.5rem, 8vw, 4rem); margin: 0; font-weight: 900; letter-spacing: -2px; }
        .about-hero h1 span { color: var(--accent); }

        /* Content Sections */
        section { padding: 60px 10%; }
        .split-content { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start; }
        .content-text p { font-size: 1.1rem; opacity: 0.8; margin-bottom: 20px; }
        
        /* Values Grid */
        .values-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 40px; }
        .value-item { background: var(--card-bg); padding: 30px; border-radius: 20px; }
        .value-item h4 { margin: 0 0 10px 0; font-size: 1.2rem; color: var(--accent); }

        footer { padding: 60px 10%; border-top: 1px solid #33333322; text-align: center; opacity: 0.5; }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .split-content { grid-template-columns: 1fr; gap: 30px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">Bondi Bay Roleplay</a>
        <div class="nav-links">
            <a href="departments.html">Departments</a>
            <a href="about.html">About</a>
            <button id="theme-toggle" onclick="toggleMode()">Theme</button>
        </div>
    </nav>

    <main>
        <div class="about-hero">
            <h1>Defining the <span>Roleplay.</span></h1>
        </div>

        <section class="split-content">
            <div class="content-title">
                <h2 style="font-size: 2rem; font-weight: 800;">Our Vision</h2>
            </div>
            <div class="content-text">
                <p>DESCRIPTION</p>
                <p>DESCRIPTION</p>
            </div>
        </section>

        <section>
            <h2 style="font-size: 2rem; font-weight: 800; margin-bottom: 30px;">Core Values</h2>
            <div class="values-grid">
                <div class="value-item">
                    <h4>VALUE</h4>
                    <p>VALUE DESC</p>
                </div>
                <div class="value-item">
                    <h4>VALUE</h4>
                    <p>VALUE DESC</p>
                </div>
                <div class="value-item">
                    <h4>VALUE</h4>
                    <p>VALUE DESC</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Notsa's Workstation</p>
    </footer>

    <script>
        function toggleMode() {
            document.body.classList.toggle('dark-theme');
            localStorage.setItem('theme', document.body.classList.contains('dark-theme') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-theme');
    </script>
</body>
</html>
