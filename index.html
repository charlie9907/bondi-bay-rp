<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bondi Bay Roleplay | Home</title>
    <style>
        :root { --bg: #ffffff; --text: #111111; --accent: #0070f3; --card: #f9f9f9; --border: #eee; }
        .dark-theme { --bg: #0a0a0a; --text: #ffffff; --accent: #3291ff; --card: #161616; --border: #333; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; transition: 0.3s; line-height: 1.6; }
        nav { display: flex; justify-content: space-between; padding: 25px 10%; align-items: center; border-bottom: 1px solid var(--border); }
        nav .links a { margin-left: 25px; text-decoration: none; color: var(--text); font-weight: 500; opacity: 0.7; transition: 0.2s; }
        nav .links a:hover { opacity: 1; }
        .hero { padding: 100px 10%; text-align: center; border-bottom: 1px solid var(--border); }
        .hero h1 { font-size: 4rem; font-weight: 900; margin: 0; letter-spacing: -2px; }
        .hero p { font-size: 1.25rem; opacity: 0.6; max-width: 600px; margin: 20px auto 40px; }
        .cta-group { display: flex; gap: 15px; justify-content: center; }
        .btn { padding: 15px 35px; border-radius: 12px; text-decoration: none; font-weight: bold; transition: 0.3s; display: inline-block; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
        .btn:hover { transform: translateY(-3px); }
        .section { padding: 80px 10%; }
        .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; }
        .f-card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--border); }
        #theme-toggle { cursor: pointer; background: var(--text); color: var(--bg); border: none; padding: 10px 20px; border-radius: 30px; font-weight: bold; }
    </style>
</head>
<body>
    <nav>
        <a href="/" style="text-decoration:none; color:var(--text); font-weight:900;">Bondi Bay</a>
        <div class="links">
            <a href="/about">About</a>
            <a href="/departments">Departments</a>
            <button id="theme-toggle" onclick="toggleMode()">Theme</button>
        </div>
    </nav>
    <header class="hero">
        <h1>Experience Bondi.</h1>
        <p>A premium Australian roleplay experience built on realism and professional emergency services.</p>
        <div class="cta-group">
            <a href="/departments" class="btn btn-primary">Our Departments</a>
            <a href="/about" class="btn btn-secondary">Learn More</a>
        </div>
    </header>
    <section class="section">
        <div class="features">
            <div class="f-card"><h3>Police</h3><p>Law enforcement via the <a href="/afp" style="color:var(--accent)">AFP</a>.</p></div>
            <div class="f-card"><h3>Medical</h3><p>Emergency care via <a href="/nswas" style="color:var(--accent)">NSWAS</a>.</p></div>
            <div class="f-card"><h3>Fire & Rescue</h3><p>Support via the <a href="/rfs" style="color:var(--accent)">RFS</a> and <a href="/ses" style="color:var(--accent)">SES</a>.</p></div>
        </div>
    </section>
    <script>
        function toggleMode() {
            document.body.classList.toggle('dark-theme');
            localStorage.setItem('theme', document.body.classList.contains('dark-theme') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-theme');
    </script>
</body>
</html>
